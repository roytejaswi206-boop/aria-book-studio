name: Build

on:
  push:
    branches:
      - main
      - staging
      - production
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install
        run: npm install --ignore-scripts

      - name: Lint server syntax
        run: node --check server.js

      - name: Lint client syntax
        run: node --check public/app.js

      - name: Build Docker image
        run: docker build -t aria-storyverse:${{ github.sha }} .

